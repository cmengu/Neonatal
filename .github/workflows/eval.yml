name: NeonatalGuard Eval CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads keyed on requirements.txt hash.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # Cache HuggingFace + FlashRank model downloads (~170 MB combined).
      # Keyed on requirements.txt so re-downloaded only when deps change.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent eval (no-LLM, CI gate)
        env:
          QDRANT_PATH: qdrant_local
        run: >
          python eval/eval_agent.py
          --no-llm
          --fail-below-f1 0.80
          --fail-above-fnr 0.0

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.sha }}
          path: results/eval_agent.json

      - name: Comment eval results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const r = JSON.parse(fs.readFileSync('results/eval_agent.json'))
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## NeonatalGuard Eval (no-LLM)',
                `F1: ${r.f1.toFixed(3)} | FNR(RED): ${r.fnr_red.toFixed(3)} | Protocol: ${(r.protocol_compliance*100).toFixed(1)}%`,
                `Correct: ${r.n_correct}/${r.n_scenarios} | Latency p50: ${Math.round(r.latency_p50_ms)}ms`
              ].join('\n')
            })
